  <main>
    <section id="partnership-form" class="page active">
      <div class="container">
        <h2 class="section-title">제휴 문의</h2>
        <div class="calc-box">
          <form id="contact-form" action="https://formspree.io/f/xqegpaqn" method="POST">
            <div class="input-group">
              <label for="name">이름</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="input-group">
              <label for="email">이메일</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
              <label for="company">회사</label>
              <input type="text" id="company" name="company">
            </div>
            <div class="input-group">
              <label for="message">문의 내용</label>
              <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit" class="btn primary" style="width: 100%;">문의 제출</button>
          </form>
          <div id="form-status"></div>
        </div>
      </div>
    </section>
